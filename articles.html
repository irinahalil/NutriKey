<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Статьи | NutriKey</title>
    <meta
      name="description"
      content="Полезные статьи по питанию, дисциплине, аппетиту и личному опыту."
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .articles-page {
        padding: 28px 0 42px;
      }
      .articles-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }
      .articles-tabs {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin: 0 0 18px;
      }
      .articles-tab {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        border-radius: 999px;
        padding: 8px 14px;
        cursor: pointer;
        font: inherit;
      }
      .articles-tab.is-active {
        background: var(--accent);
        color: #241f29;
        border-color: var(--accent);
      }
      .articles-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 14px;
      }
      .article-card {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .article-card img {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
      }
      .article-card-body {
        padding: 14px;
      }
      .article-card-title {
        margin: 0 0 8px;
        font-size: 1.05rem;
      }
      .article-card-meta {
        color: var(--muted);
        font-size: 0.9rem;
        margin: 0 0 8px;
      }
      .article-card p {
        margin: 0;
      }
      .articles-empty {
        color: var(--muted);
      }
    </style>
  </head>
  <body data-page="articles">
    <header class="header">
      <div class="container nav">
        <a href="index.html" class="logo">Ирина Халил</a>
        <nav class="nav-actions" aria-label="Навигация">
          <a class="btn btn-small" id="back-home-link" href="index.html">На главную</a>
        </nav>
      </div>
    </header>

    <main class="articles-page">
      <div class="container">
        <div class="articles-head">
          <h1 id="articles-title">Статьи</h1>
        </div>
        <div id="articles-tabs" class="articles-tabs" role="tablist" aria-label="Категории"></div>
        <div id="articles-list" class="articles-list"></div>
        <p id="articles-empty" class="articles-empty" hidden>В этой категории пока нет статей.</p>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="cms-config.js"></script>
    <script src="articles.js"></script>
  </body>
</html>
